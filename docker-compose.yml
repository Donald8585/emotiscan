# ═══════════════════════════════════════════════════════════════════════
# EmotiScan Docker Compose
#
# Usage:
#   CPU (school PCs):   docker compose --profile cpu up --build
#   With NVIDIA GPU:    docker compose --profile gpu up --build
#   With Ollama:        docker compose --profile ollama up --build
#   GPU + Ollama:       docker compose --profile gpu --profile ollama up --build
#
# Ollama connectivity:
#   - If Ollama runs on your HOST machine, it's auto-detected via
#     host.docker.internal (Docker Desktop) or host-gateway (Linux).
#   - If you want Ollama IN Docker, use --profile ollama.
#   - Override manually: OLLAMA_URL=http://x.x.x.x:8003 docker compose up
#
# First build takes ~5-10 min (CPU) or ~10-15 min (GPU). After that, instant.
# ═══════════════════════════════════════════════════════════════════════

services:
  # ── EmotiScan (CPU mode — default) ─────────────────────────────
  emotiscan:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emotiscan
    ports:
      - "80:80"
      - "8001:8001"   # MCP Inspector: http://localhost:8001/mcp  (ArXiv Search)
      - "8002:8002"   # MCP Inspector: http://localhost:8002/mcp  (Ranker)
    volumes:
      - emotiscan-data:/app/data
      - emotiscan-models:/root/.cache
      - emotiscan-hsemotion:/root/.hsemotion
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
      - MCP_ARXIV_HOST=localhost
      - MCP_ARXIV_PORT=8001
      - MCP_RANKER_HOST=localhost
      - MCP_RANKER_PORT=8002
      - EMOTISCAN_DATA_DIR=/app/data
      - STREAMLIT_SERVER_PORT=80
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    profiles: ["cpu"]

  # ── EmotiScan (GPU mode — NVIDIA) ──────────────────────────────
  emotiscan-gpu:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_INDEX: https://download.pytorch.org/whl/cu126
    container_name: emotiscan-gpu
    ports:
      - "80:80"
      - "8001:8001"   # MCP Inspector: http://localhost:8001/mcp  (ArXiv Search)
      - "8002:8002"   # MCP Inspector: http://localhost:8002/mcp  (Ranker)
    volumes:
      - emotiscan-data:/app/data
      - emotiscan-models:/root/.cache
      - emotiscan-hsemotion:/root/.hsemotion
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:8003}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
      - MCP_ARXIV_HOST=localhost
      - MCP_ARXIV_PORT=8001
      - MCP_RANKER_HOST=localhost
      - MCP_RANKER_PORT=8002
      - EMOTISCAN_DATA_DIR=/app/data
      - STREAMLIT_SERVER_PORT=80
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - NVIDIA_VISIBLE_DEVICES=all
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    profiles: ["gpu"]

  # ── Ollama (optional — use if not running on host) ─────────────
  ollama:
    image: ollama/ollama:latest
    container_name: emotiscan-ollama
    ports:
      - "8003:11434"
    volumes:
      - ollama-models:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        SERVER_PID=$$!
        until curl -sf http://localhost:8003/api/tags >/dev/null 2>&1; do sleep 2; done
        ollama pull ${OLLAMA_MODEL:-qwen3:8b}
        curl -s http://localhost:8003/api/generate -d "{\"model\":\"${OLLAMA_MODEL:-qwen3:8b}\",\"keep_alive\":-1}" >/dev/null
        wait $$SERVER_PID
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    profiles: ["ollama"]

volumes:
  emotiscan-data:
  emotiscan-models:
  emotiscan-hsemotion:
  ollama-models:
